services:
  api:
    build:
      context: ./backend
      dockerfile: src/CarAuction.Api/Dockerfile
    container_name: carauction-api
    ports:
      - "8080:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - JwtSettings__SecretKey=CarAuctionSuperSecretKeyForJWT2024MustBe32CharsMin!
      - JwtSettings__ExpirationMinutes=480
    networks:
      - carauction-network
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: carauction-frontend
    ports:
      - "3000:80"
    depends_on:
      - api
    networks:
      - carauction-network
    restart: unless-stopped

networks:
  carauction-network:
    driver: bridge
